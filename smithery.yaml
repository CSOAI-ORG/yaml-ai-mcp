name: yaml-ai-mcp
description: AI-powered yaml ai MCP server for agents. Supports validate yaml, convert
  yaml json, lint yaml. By MEOK AI Labs.
version: 1.0.0
tools:
- name: validate_yaml
  description: Validate YAML syntax and report any errors.
  parameters:
  - name: content
    type: string
    required: true
- name: convert_yaml_json
  description: Convert between YAML and JSON formats.
  parameters:
  - name: content
    type: string
    required: true
  - name: direction
    type: string
    required: false
- name: lint_yaml
  description: Lint YAML content for style issues and best practices.
  parameters:
  - name: content
    type: string
    required: true
- name: merge_yaml
  description: Merge two YAML documents together.
  parameters:
  - name: yaml_a
    type: string
    required: true
  - name: yaml_b
    type: string
    required: true
  - name: strategy
    type: string
    required: false
